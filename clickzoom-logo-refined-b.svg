<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="gA5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gC5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312E81;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Dark background pill -->
  <rect x="0" y="5" width="400" height="105" rx="16" fill="url(#gC5)"/>
  
  <!-- Icon: Film strip square frame -->
  <g transform="translate(14, 14)">
    <!-- Film strip body -->
    <rect x="4" y="4" width="78" height="78" rx="6" fill="none" stroke="url(#gA5)" stroke-width="2.5"/>
    
    <!-- Film strip sprocket holes - top row -->
    <rect x="10" y="8" width="8" height="6" rx="1.5" fill="url(#gA5)" opacity="0.5"/>
    <rect x="23" y="8" width="8" height="6" rx="1.5" fill="url(#gA5)" opacity="0.5"/>
    <rect x="36" y="8" width="8" height="6" rx="1.5" fill="url(#gA5)" opacity="0.5"/>
    <rect x="49" y="8" width="8" height="6" rx="1.5" fill="url(#gA5)" opacity="0.5"/>
    <rect x="62" y="8" width="8" height="6" rx="1.5" fill="url(#gA5)" opacity="0.5"/>
    
    <!-- Film strip sprocket holes - bottom row -->
    <rect x="10" y="72" width="8" height="6" rx="1.5" fill="url(#gA5)" opacity="0.5"/>
    <rect x="23" y="72" width="8" height="6" rx="1.5" fill="url(#gA5)" opacity="0.5"/>
    <rect x="36" y="72" width="8" height="6" rx="1.5" fill="url(#gA5)" opacity="0.5"/>
    <rect x="49" y="72" width="8" height="6" rx="1.5" fill="url(#gA5)" opacity="0.5"/>
    <rect x="62" y="72" width="8" height="6" rx="1.5" fill="url(#gA5)" opacity="0.5"/>
    
    <!-- Film frame area -->
    <rect x="10" y="18" width="66" height="50" rx="3" fill="url(#gA5)" opacity="0.08"/>
    
    <!-- Zoom rings inside the frame -->
    <circle cx="43" cy="43" r="18" fill="none" stroke="url(#gA5)" stroke-width="1.5" opacity="0.35"/>
    <circle cx="43" cy="43" r="11" fill="none" stroke="url(#gA5)" stroke-width="1.2" opacity="0.25"/>
    
    <!-- Cursor arrow -->
    <g transform="translate(32, 28)">
      <path d="M 0 0 L 0 22 L 6 17 L 11 27 L 15 25 L 10 15 L 17 15 Z" 
            fill="url(#gA5)" stroke="white" stroke-width="1.2" stroke-linejoin="round"/>
    </g>
    
    <!-- Rec dot -->
    <circle cx="18" cy="24" r="3.5" fill="#EF4444"/>
  </g>
  
  <!-- Text - one word ClickZoom -->
  <text x="108" y="62" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="46" font-weight="700" letter-spacing="-1">
    <tspan fill="white">Click</tspan><tspan fill="url(#gA5)">Zoom</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="108" y="88" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="#A5B4FC" letter-spacing="3">
    RECORD · POLISH · DEMO</text>
</svg>
