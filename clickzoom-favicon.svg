<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="fg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312E81;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Dark rounded square -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="url(#fg2)"/>
  
  <!-- Film frame hint - just two lines top and bottom -->
  <line x1="6" y1="6" x2="26" y2="6" stroke="url(#fg1)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="6" y1="26" x2="26" y2="26" stroke="url(#fg1)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Sprocket dots top -->
  <circle cx="9" cy="6" r="1.2" fill="url(#fg1)" opacity="0.6"/>
  <circle cx="14" cy="6" r="1.2" fill="url(#fg1)" opacity="0.6"/>
  <circle cx="19" cy="6" r="1.2" fill="url(#fg1)" opacity="0.6"/>
  <circle cx="24" cy="6" r="1.2" fill="url(#fg1)" opacity="0.6"/>
  
  <!-- Sprocket dots bottom -->
  <circle cx="9" cy="26" r="1.2" fill="url(#fg1)" opacity="0.6"/>
  <circle cx="14" cy="26" r="1.2" fill="url(#fg1)" opacity="0.6"/>
  <circle cx="19" cy="26" r="1.2" fill="url(#fg1)" opacity="0.6"/>
  <circle cx="24" cy="26" r="1.2" fill="url(#fg1)" opacity="0.6"/>
  
  <!-- Cursor - simplified for small size -->
  <g transform="translate(11, 10)">
    <path d="M 0 0 L 0 12 L 3.5 9 L 6 14 L 8.5 13 L 6 8 L 10 8 Z" 
          fill="url(#fg1)" stroke="white" stroke-width="0.7" stroke-linejoin="round"/>
  </g>
  
  <!-- Rec dot -->
  <circle cx="24" cy="11" r="2" fill="#EF4444"/>
</svg>
